# \u30c7\u30fc\u30bf\u30d9\u30fc\u30b9\u63a5\u7d9a\u8a2d\u5b9a
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/omakakakeibo_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo
spring.datasource.username=root
spring.datasource.password=
# MyBatis\u306e\u8a2d\u5b9a
mybatis.mapper-locations=classpath*:/mybatis/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.example.app.domain
# SQL\u30ed\u30b0\u3092\u51fa\u529b\u3059\u308b\uff08\u30c7\u30d0\u30c3\u30b0\u7528\uff09
logging.level.com.example.app.mapper=DEBUG
# \u63a5\u7d9a\u30c9\u30e9\u30a4\u30d0\u306e\u660e\u793a\uff08\u6700\u8fd1\u306eSpring Boot\u306a\u3089\u81ea\u52d5\u3060\u3051\u3069\u5ff5\u306e\u305f\u3081\uff09
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver